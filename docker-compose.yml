services:
  postgres:
    image: postgres:18-alpine
    container_name: gayakini-db
    environment:
      - POSTGRES_DB=gayakini
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gayakini"]
      interval: 10s
      timeout: 5s
      retries: 5
