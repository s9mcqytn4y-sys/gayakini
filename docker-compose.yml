networks:
  gayakini-network:
    driver: bridge

volumes:
  gayakini_postgres_data:
    name: gayakini_postgres_data

services:
  postgres:
    image: postgres:18-alpine
    container_name: gayakini-db
    restart: unless-stopped
    networks:
      - gayakini-network
    volumes:
      - gayakini_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-gayakini}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-gayakini}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gayakini-app
    restart: unless-stopped
    networks:
      - gayakini-network
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-gayakini}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_SCHEMA=${DB_SCHEMA:-commerce}
      - APP_BASE_URL=http://localhost:${SERVER_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  mailpit:
    image: axllent/mailpit
    container_name: gayakini-mailpit
    restart: unless-stopped
    networks:
      - gayakini-network
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
