# Gayakini Environment Architecture
# Usage:
#   Local (infra only): docker compose up -d
#   Full (app + infra): docker compose --profile full up -d

services:
  db:
    image: postgres:17-alpine
    container_name: gayakini-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-gayakini}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-gayakini}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gayakini-network

  mail:
    image: axllent/mailpit
    container_name: gayakini-mail
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-1025}:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 500
    networks:
      - gayakini-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gayakini-app
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-gayakini}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - SMTP_HOST=mail
      - SMTP_PORT=1025
      - JWT_SECRET=${JWT_SECRET}
      # Container-aware percentages: 25% of 1024MB init, 75% max (768MB).
      # G1GC for low latency, OOM Exit for stability, NMT for monitoring.
      - JAVA_TOOL_OPTIONS=-XX:InitialRAMPercentage=25 -XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -XX:NativeMemoryTracking=summary -XshowSettings:vm
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gayakini-network

volumes:
  postgres_data:

networks:
  gayakini-network:
    driver: bridge
