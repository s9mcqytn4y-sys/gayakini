name: CI - Gayakini Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: gayakini_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint (ktlint)
      run: ./gradlew ktlintCheck

    - name: Run Static Analysis (detekt)
      run: ./gradlew detekt

    - name: Build and Test
      run: ./gradlew build --info
      env:
        SPRING_PROFILES_ACTIVE: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: gayakini_test
        DB_USERNAME: postgres
        DB_PASSWORD: password
        MIDTRANS_SERVER_KEY: dummy_test_key
        BITESHIP_API_KEY: dummy_test_key
    
    - name: Build Docker Image
      run: docker build -t gayakini-backend:latest .
