name: Validate Local MCP Launchers

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tooling/mcp/**'
      - '.github/workflows/**'
      - '.vscode/**'
      - '.agents/**'
      - 'AGENTS.md'
      - 'gemini.md'
      - 'CLAUDE.md'
      - 'CODEX.md'
      - 'docs/tooling/**'
      - 'docs/agents/**'
      - 'docs/RELEASE_CHECKLIST.md'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tooling/mcp/**'
      - '.github/workflows/**'
      - '.vscode/**'
      - '.agents/**'
      - 'AGENTS.md'
      - 'gemini.md'
      - 'CLAUDE.md'
      - 'CODEX.md'
      - 'docs/tooling/**'
      - 'docs/agents/**'
      - 'docs/RELEASE_CHECKLIST.md'

jobs:
  validate-launchers:
    name: PowerShell MCP launcher validation
    runs-on: windows-latest
    env:
      PROJECT_ROOT: ${{ github.workspace }}
      GITHUB_PERSONAL_ACCESS_TOKEN: dummy_local_token
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse PowerShell launchers
        shell: powershell
        run: |
          Get-ChildItem "$env:GITHUB_WORKSPACE\tooling\mcp\*.ps1" |
            Sort-Object Name |
            ForEach-Object {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
              if ($parseErrors -and $parseErrors.Count -gt 0) {
                throw "Parse failed for $($_.Name): $($parseErrors[0].Message)"
              }
            }

      - name: Validate each launcher in tooling/mcp
        shell: powershell
        run: |
          Get-ChildItem "$env:GITHUB_WORKSPACE\tooling\mcp\start-*.ps1" |
            Sort-Object Name |
            ForEach-Object {
              powershell.exe -NoProfile -ExecutionPolicy Bypass -File $_.FullName -ValidateOnly
            }

  validate-docs-and-workspace:
    name: Agent docs and workspace sanity
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files exist
        shell: powershell
        run: |
          $requiredFiles = @(
            'AGENTS.md',
            'gemini.md',
            'CLAUDE.md',
            'CODEX.md',
            'docs/tooling/mcp-servers.md',
            'docs/agents/codex-mcp-prompts.md',
            'docs/agents/codex.md',
            'docs/RELEASE_CHECKLIST.md',
            '.vscode/settings.json',
            '.vscode/launch.json',
            '.vscode/tasks.json',
            '.vscode/extensions.json',
            '.agents/workflows/validate-mcp-launchers.md',
            '.agents/workflows/docs-parity-check.md',
            '.agents/workflows/mcp-hardening-preflight.md',
            '.agents/workflows/gradle-release-verification.md',
            '.agents/workflows/run-application.md'
          )
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $file -PathType Leaf)) {
              throw "Missing required file: $file"
            }
          }

      - name: Validate workspace JSON files
        shell: powershell
        run: |
          @(
            '.vscode/settings.json',
            '.vscode/launch.json',
            '.vscode/tasks.json',
            '.vscode/extensions.json'
          ) | ForEach-Object {
            Get-Content $_ -Raw | ConvertFrom-Json | Out-Null
          }

      - name: Validate MCP doc parity
        shell: powershell
        run: |
          $docsWithLauncherFiles = @(
            'AGENTS.md',
            'docs/tooling/mcp-servers.md'
          )
          $providerDocs = @(
            'gemini.md',
            'CLAUDE.md',
            'CODEX.md',
            'docs/agents/codex-mcp-prompts.md',
            'docs/agents/codex.md'
          )
          $requiredLauncherTerms = @(
            'ValidateOnly',
            'start-filesystem.ps1',
            'start-postgres.ps1',
            'start-github.ps1',
            'start-git.ps1',
            'start-terminal.ps1',
            'start-http.ps1',
            'start-browser.ps1'
          )
          foreach ($doc in $docsWithLauncherFiles) {
            $content = Get-Content $doc -Raw
            foreach ($term in $requiredLauncherTerms) {
              if ($content -notmatch [regex]::Escape($term)) {
                throw "Missing '$term' in $doc"
              }
            }
          }
          foreach ($doc in $providerDocs) {
            $content = Get-Content $doc -Raw
            foreach ($term in @('AGENTS.md', 'ValidateOnly')) {
              if ($content -notmatch [regex]::Escape($term)) {
                throw "Missing '$term' in $doc"
              }
            }
          }
