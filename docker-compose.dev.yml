# Gayakini Full Stack Development environment (Dockerized)
services:
  db:
    image: postgres:16-alpine
    container_name: gayakini-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gayakini}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-gayakini}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gayakini-network

  mail:
    image: axllent/mailpit
    container_name: gayakini-mail-dev
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
    networks:
      - gayakini-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gayakini-app-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-gayakini}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - SMTP_HOST=mail
      - SMTP_PORT=1025
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-XX:InitialRAMPercentage=25 -XX:MaxRAMPercentage=60
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gayakini-network

networks:
  gayakini-network:
    driver: bridge
