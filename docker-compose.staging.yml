# Gayakini Staging (Pre-production Parity)
# This stack simulates a real deployment with strict environment variable enforcement.
services:
  db:
    image: postgres:17-alpine
    container_name: gayakini-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gayakini-staging-net

  mail:
    image: axllent/mailpit
    container_name: gayakini-mail-staging
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 1000
    networks:
      - gayakini-staging-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gayakini-app-staging
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SMTP_HOST=mail
      - SMTP_PORT=1025
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - BITESHIP_API_KEY=${BITESHIP_API_KEY}
      - BITESHIP_WEBHOOK_SECRET=${BITESHIP_WEBHOOK_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      # Staging Parity: 50% init (fast startup), 75% max. 1.5GB limit = ~1.1GB Heap.
      - JAVA_TOOL_OPTIONS=-XX:InitialRAMPercentage=25 -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError
    deploy:
      resources:
        limits:
          memory: 1536M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gayakini-staging-net

networks:
  gayakini-staging-net:
    driver: bridge
