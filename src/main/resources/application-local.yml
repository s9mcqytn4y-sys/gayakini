spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gayakini}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false                 # Reduced noise
    properties:
      hibernate:
        format_sql: true
        default_schema: commerce
  flyway:
    enabled: true
    default-schema: commerce
    schemas: commerce, public
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false
    clean-on-validation-error: true

logging:
  level:
    root: INFO
    com.gayakini: DEBUG
    org.hibernate.SQL: INFO        # Only log when explicitly needed
    org.hibernate.orm.jdbc.bind: ERROR # Kill the trace noise
    org.springframework.web: INFO

gayakini:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-change-this-in-production-at-least-32-chars}
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
  midtrans:
    is-production: false
    server-key: ${MIDTRANS_SERVER_KEY:your-midtrans-server-key}
    client-key: ${MIDTRANS_CLIENT_KEY:your-midtrans-client-key}
  biteship:
    api-key: ${BITESHIP_API_KEY:your-biteship-api-key}
