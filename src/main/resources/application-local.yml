spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gayakini}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: ${DB_SCHEMA:commerce}
  flyway:
    enabled: true
    default-schema: ${DB_SCHEMA:commerce}
    schemas: ${DB_SCHEMA:commerce}, public
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:null}
    password: ${SMTP_PASSWORD:null}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    com.gayakini: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: ERROR
    org.springframework.web: INFO

gayakini:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-characters-long}
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
  midtrans:
    is-production: ${MIDTRANS_IS_PRODUCTION:false}
    server-key: ${MIDTRANS_SERVER_KEY:your-midtrans-server-key}
    client-key: ${MIDTRANS_CLIENT_KEY:your-midtrans-client-key}
    api-url: ${MIDTRANS_API_URL:https://api.sandbox.midtrans.com/v2}
    snap-url: ${MIDTRANS_SNAP_URL:https://app.sandbox.midtrans.com/snap/v1/transactions}
  biteship:
    api-key: ${BITESHIP_API_KEY:your-biteship-api-key}
    api-url: ${BITESHIP_API_URL:https://api.biteship.com/v1}
    webhook-secret: ${BITESHIP_WEBHOOK_SECRET:dummy-webhook-secret}
