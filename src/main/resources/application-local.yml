spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gayakini}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: commerce
  flyway:
    enabled: true
    default-schema: commerce
    schemas: commerce
    baseline-on-migrate: true

logging:
  level:
    com.gayakini: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# App Specific Properties (Override defaults in GayakiniProperties)
gayakini:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-change-this-in-production-at-least-32-chars}
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
  midtrans:
    is-production: false
    server-key: ${MIDTRANS_SERVER_KEY:your-midtrans-server-key}
    client-key: ${MIDTRANS_CLIENT_KEY:your-midtrans-client-key}
  biteship:
    api-key: ${BITESHIP_API_KEY:your-biteship-api-key}
