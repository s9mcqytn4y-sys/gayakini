# Development Overlay (Runs in Docker Dev Stack)
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:gayakini}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  mail:
    host: ${SMTP_HOST:mail}
    port: ${SMTP_PORT:1025}

gayakini:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-at-least-32-chars-long}
  midtrans:
    is-production: false
    server-key: ${MIDTRANS_SERVER_KEY}
  biteship:
    api-key: ${BITESHIP_API_KEY}

logging:
  level:
    com.gayakini: DEBUG
