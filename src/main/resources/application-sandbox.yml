# Sandbox Profile for Midtrans Integration
# This profile enforces sandbox URLs and fails if production keys are provided.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gayakini}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

gayakini:
  midtrans:
    is-production: false
    server-key: ${MIDTRANS_SERVER_KEY}
    client-key: ${MIDTRANS_CLIENT_KEY}
    api-url: https://api.sandbox.midtrans.com/v2
    snap-url: https://app.sandbox.midtrans.com/snap/v1/transactions
  biteship:
    api-url: https://api.biteship.com/v1
    # Api key and webhook secret are still required but only used for schema-ready purposes
    api-key: ${BITESHIP_API_KEY:dummy-sandbox-key}
    webhook-secret: ${BITESHIP_WEBHOOK_SECRET:dummy-sandbox-secret}
