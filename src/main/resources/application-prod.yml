# Production Configuration Template for Gayakini
# This file defines strict requirements for production environments.
# Secrets MUST be provided via environment variables.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    clean-disabled: true

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

gayakini:
  jwt:
    secret: ${JWT_SECRET}
  midtrans:
    is-production: true
    server-key: ${MIDTRANS_SERVER_KEY}
    client-key: ${MIDTRANS_CLIENT_KEY}
    api-url: https://api.midtrans.com/v2
    snap-url: https://app.midtrans.com/snap/v1/transactions
  biteship:
    api-key: ${BITESHIP_API_KEY}
    api-url: https://api.biteship.com/v1
    webhook-secret: ${BITESHIP_WEBHOOK_SECRET}

logging:
  level:
    root: INFO
    com.gayakini: INFO
    org.hibernate.SQL: ERROR
