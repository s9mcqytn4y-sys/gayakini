# Production environment configuration
# Strictly reads from environment variables.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}

gayakini:
  jwt:
    secret: ${JWT_SECRET}
  midtrans:
    is-production: true
    merchant-id: ${MIDTRANS_MERCHANT_ID}
    server-key: ${MIDTRANS_SERVER_KEY}
    client-key: ${MIDTRANS_CLIENT_KEY}
    api-url: ${MIDTRANS_API_URL:https://api.midtrans.com/v2}
    snap-url: ${MIDTRANS_SNAP_URL:https://app.midtrans.com/snap/v1/transactions}
  biteship:
    api-key: ${BITESHIP_API_KEY}
    api-url: ${BITESHIP_API_URL:https://api.biteship.com/v1}
    webhook-secret: ${BITESHIP_WEBHOOK_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: WARN
    com.gayakini: INFO
