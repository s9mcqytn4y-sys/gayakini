# Configuration for running the app inside a Docker container (Docker Compose)
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:gayakini}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    default-schema: ${DB_SCHEMA:commerce}
    schemas: ${DB_SCHEMA:commerce}, public

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.gayakini: DEBUG

gayakini:
  jwt:
    secret: ${JWT_SECRET:docker-compose-secret-key-at-least-32-characters}
  midtrans:
    is-production: false
    api-url: https://api.sandbox.midtrans.com/v2
    snap-url: https://app.sandbox.midtrans.com/snap/v1/transactions
