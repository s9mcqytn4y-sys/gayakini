spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS commerce
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: commerce
  flyway:
    enabled: false

gayakini:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-jwt-signing
  cors:
    allowed-origins:
      - http://localhost:3000
  midtrans:
    is-production: false
    server-key: dummy-server-key
    client-key: dummy-client-key
    api-url: http://localhost:8081
    snap-url: http://localhost:8081/snap
  biteship:
    api-key: dummy-api-key
    api-url: http://localhost:8082/v1
    webhook-secret: dummy-webhook-secret
