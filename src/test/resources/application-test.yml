spring:
  # DataSource is managed by @ServiceConnection in BaseDbIntegrationTest
  # or disabled in BaseWireMockTest via the 'test-no-db' profile.
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: commerce
        format_sql: true
  flyway:
    enabled: true
    default-schema: commerce
    schemas: commerce
    locations: classpath:db/migration
  sql:
    init:
      mode: never

gayakini:
  midtrans:
    server-key: "dummy-test-key"
    client-key: "dummy-test-key"
    snap-url: "https://app.sandbox.midtrans.com/snap/v1/transactions"
    api-url: "https://api.sandbox.midtrans.com/v2"
    is-production: false
  biteship:
    api-key: "dummy-test-key"
    api-url: "https://api.biteship.com/v1"
    webhook-secret: "dummy-webhook-secret"
  jwt:
    secret: super-secret-key-change-this-in-production-at-least-chars-32
  cors:
    allowed-origins:
      - "*"
